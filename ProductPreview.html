<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="ProductPreviewStyle.css">

  <title>Product Card</title>
</head>
<body>

  <div class="card">
    
    <div class="card-image">
      <img src="image-product-desktop.jpg" alt="Product image">
    </div>

    <div class="card-content">
      <p class="category">Perfume</p>

      <h1 class="title">
        Gabrielle Essence Eau De Parfum
      </h1>

      <p class="description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="price">
        <span class="current">$149.99</span>
        <span class="old">$169.99</span>
      </div>

      <button class="btn">
        <img src="icon-cart.svg" alt="">
        Add to Cart
      </button>
    </div>

  </div>

</body>
</html>
